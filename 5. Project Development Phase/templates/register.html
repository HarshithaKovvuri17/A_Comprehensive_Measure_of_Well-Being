<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Human Development Index — Register</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Plus+Jakarta+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #090e1a;
            --text-color: #ffffff;
            --text-muted: #8c9bb4;
            --card-bg: #241901;
            --border-color: #d0a345;
            --brass: #c89b3c;
            --brass-hover: #e5b955;
        }

        body {
            background: linear-gradient(to bottom, #523a08 0%, #000000 100%);
            background-attachment: fixed;
            color: var(--text-color);
            font-family: 'Plus Jakarta Sans', sans-serif;
            margin: 0;
            padding: 0;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        .navbar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 24px 6%;
            background-color: rgba(7, 11, 19, 0.8);
            backdrop-filter: blur(12px);
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .navbar-brand {
            font-family: 'Plus Jakarta Sans', sans-serif;
            font-weight: 700;
            font-size: 20px;
            color: var(--text-color);
            text-decoration: none;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .navbar-brand span {
            color: #c89b3c;
        }

        .form-container {
            background: var(--card-bg);
            backdrop-filter: blur(12px);
            width: 90%;
            max-width: 600px;
            margin: 60px auto;
            padding: 48px;
            box-sizing: border-box;
            border-radius: 12px;
            border: 2px solid var(--border-color);
            box-shadow: 0 30px 60px rgba(0, 0, 0, 0.4), 0 0 15px rgba(208, 163, 69, 0.4);
        }

        .form-container h1 {
            font-family: 'Playfair Display', serif;
            font-style: italic;
            font-size: 32px;
            font-weight: 400;
            margin: 0 0 16px 0;
            color: #d0a345;
            text-align: center;
        }
        
        .form-container p {
            color: var(--text-muted);
            margin-bottom: 32px;
            font-size: 14px;
            text-align: center;
        }

        .form-group {
            display: flex;
            flex-direction: column;
            margin-bottom: 24px;
        }

        .form-label {
            font-size: 13px;
            font-weight: 700;
            letter-spacing: 1.5px;
            color: var(--brass);
            text-transform: uppercase;
            margin-bottom: 12px;
        }

        .form-input {
            width: 100%;
            height: 58px;
            padding: 0 24px;
            box-sizing: border-box;
            background: #241901;
            border: 1.5px solid #d0a345;
            border-radius: 50px;
            color: #ffffff;
            font-family: 'Plus Jakarta Sans', sans-serif;
            font-size: 17px;
            outline: none;
        }

        .form-input:focus {
            box-shadow: 0 0 10px rgba(208, 163, 69, 0.35);
        }
        
        .form-input::placeholder {
            color: rgba(208, 163, 69, 0.45);
        }
        
        select.form-input:invalid {
            color: rgba(208, 163, 69, 0.45);
        }
        
        select.form-input option {
            color: #ffffff;
            background: #241901;
        }

        .btn-predict {
            width: 100%;
            padding: 16px;
            background: linear-gradient(90deg, #b8892e 0%, #d0a345 100%);
            border: none;
            border-radius: 50px;
            color: #000000;
            font-size: 16px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s ease;
            margin-top: 16px;
        }

        .btn-predict:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(208, 163, 69, 0.5);
        }

        .login-link {
            text-align: center;
            margin-top: 24px;
            font-size: 14px;
            color: var(--text-muted);
        }

        .login-link a {
            color: var(--brass);
            text-decoration: none;
            font-weight: 600;
        }

        .login-link a:hover {
            text-decoration: underline;
        }

        .error-message {
            background: rgba(255, 87, 87, 0.1);
            color: #ff5757;
            padding: 12px;
            border-radius: 8px;
            border: 1px solid rgba(255, 87, 87, 0.3);
            text-align: center;
            margin-bottom: 24px;
            font-size: 14px;
        }
    </style>
</head>
<body>
    <header class="navbar">
        <a href="/" class="navbar-brand">
            <span>•</span> HDI Insight
        </a>
    </header>

    <div class="form-container">
        <h1>Create Account</h1>
        <p>Register below to access the HDI Prediction Console.</p>

        {% if error %}
        <div class="error-message">
            {{ error }}
        </div>
        {% endif %}

        <form action="/register" method="POST">
            <div class="form-group">
                <label class="form-label">Name</label>
                <input type="text" class="form-input" name="name" placeholder="Enter your full name" required autofocus>
            </div>
            
            <div class="form-group">
                <label class="form-label">Email</label>
                <input type="email" class="form-input" name="email" placeholder="Enter your email address" required>
            </div>
            
            <div class="form-group">
                <label class="form-label">Password</label>
                <input type="password" class="form-input" name="password" placeholder="Create a strong password" required>
            </div>
            
            <div class="form-group">
                <label class="form-label">Confirm Password</label>
                <input type="password" class="form-input" name="confirm_password" placeholder="Re-enter your password" required>
            </div>
            
            <div class="form-group">
                <label class="form-label">Role</label>
                <select class="form-input" style="appearance: auto;" name="role" required>
                    <option value="" disabled selected>Select Role</option>
                    <option value="Admin">Admin</option>
                    <option value="Researcher">Researcher</option>
                    <option value="Analyst">Analyst</option>
                    <option value="User">User</option>
                </select>
            </div>
            
            <button type="submit" class="btn-predict">Sign Up</button>
        </form>
        
        <div class="login-link">
            Already have an account? <a href="/login">Log in here</a>
        </div>
    </div>
</body>
</html>
